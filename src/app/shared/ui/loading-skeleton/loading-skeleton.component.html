<div class="ui-loading-grid" aria-busy="true">
  @for (item of skeletonItems(); track item) {
    <div class="ui-loading-card ui-card-surface">
      <div class="ui-loading-card__image">
        <p-skeleton width="100%" height="100%" />
      </div>
      <div class="ui-loading-card__body">
        <p-skeleton width="72%" height="1.15rem" />
        <p-skeleton width="46%" height="0.9rem" />
        <p-skeleton width="36%" height="1rem" />
      </div>
    </div>
  }
</div>
