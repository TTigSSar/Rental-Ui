<p-dialog
  styleClass="cd"
  [visible]="isOpen()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!confirming()"
  [style]="{ width: '28rem', maxWidth: '95vw' }"
  showTransitionOptions="200ms cubic-bezier(0.4, 0, 0.2, 1)"
  hideTransitionOptions="160ms cubic-bezier(0.4, 0, 1, 1)"
  (visibleChange)="onDialogVisibleChange($event)"
>
  <ng-template pTemplate="header">
    <span class="cd__header-row">
      <i class="cd__header-icon" [ngClass]="headerIconClass()" aria-hidden="true"></i>
      {{ title() }}
    </span>
  </ng-template>

  <p class="cd__body">{{ message() }}</p>

  <ng-template pTemplate="footer">
    <div class="cd__footer">
      <p-button
        type="button"
        severity="secondary"
        [outlined]="true"
        [label]="cancelLabel()"
        [disabled]="confirming()"
        (onClick)="onCancel()"
      />
      <p-button
        type="button"
        [severity]="confirmSeverity()"
        [label]="confirmLabel()"
        [loading]="confirming()"
        [disabled]="confirming()"
        (onClick)="onConfirm()"
      />
    </div>
  </ng-template>
</p-dialog>
