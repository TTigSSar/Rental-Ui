<div class="ff" [class.ff--error]="showError()">
  <label [for]="inputId()" class="ff__label">
    {{ label() }}@if (required()) {<span class="ff__required" aria-hidden="true"> *</span>}
  </label>

  <ng-content />

  @if (hint() && !showError()) {
    <p class="ff__hint" [id]="inputId() + '-hint'">{{ hint() }}</p>
  }

  @if (showError() && errorMessage()) {
    <p class="ff__error" [id]="inputId() + '-error'" role="alert">{{ errorMessage() }}</p>
  }
</div>
