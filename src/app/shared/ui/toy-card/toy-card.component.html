<article class="toy-card">
  <div class="toy-card__img-wrap">
    <img [src]="toy().imageUrl" [alt]="toy().title" class="toy-card__img" loading="lazy" />
    <span class="toy-card__chip" [class.toy-card__chip--rented]="!toy().available">
      {{ toy().available ? 'Available' : 'Rented now' }}
    </span>
    <button class="toy-card__heart" type="button" aria-label="Remove from saved">
      <app-icon name="heart-fill" [size]="16" />
    </button>
  </div>
  <div class="toy-card__body">
    <h3 class="toy-card__title">{{ toy().title }}</h3>
    <p class="toy-card__meta">{{ toy().age }} · ★ {{ toy().rating }} · {{ toy().owner }}</p>
    <div class="toy-card__footer">
      <span class="toy-card__price" [class.toy-card__price--muted]="!toy().available">
        ₽{{ toy().pricePerDay | number }} <span class="toy-card__per">/day</span>
      </span>
      <button
        class="toy-card__cta"
        [class.toy-card__cta--disabled]="!toy().available"
        [disabled]="!toy().available ? true : null"
        type="button"
      >
        {{ toy().available ? 'Rent' : 'Notify me' }}
      </button>
    </div>
  </div>
</article>
