<div class="ui-empty-state ui-card-surface" role="status">
  <div
    class="ui-empty-state__icon-wrap"
    [class]="'ui-empty-state__icon-wrap--' + tone()"
    aria-hidden="true"
  >
    <span class="ui-empty-state__icon pi" [class]="icon()"></span>
    @if (showPlusBadge()) {
      <span class="ui-empty-state__badge" aria-hidden="true">+</span>
    }
  </div>
  <h2 class="ui-empty-state__title">{{ title() }}</h2>
  <p class="ui-empty-state__text">{{ description() }}</p>
  @if (ctaLabel()) {
    @if (ctaRouterLink(); as link) {
      <p-button
        type="button"
        [label]="ctaLabel()!"
        [icon]="ctaIcon()"
        [routerLink]="link"
        (onClick)="ctaClicked.emit()"
      />
    } @else {
      <p-button
        type="button"
        [label]="ctaLabel()!"
        [icon]="ctaIcon()"
        (onClick)="ctaClicked.emit()"
      />
    }
  }
</div>
