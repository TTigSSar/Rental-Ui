<div class="filter-tabs">
  @for (tab of tabs(); track tab.key) {
    <button
      class="filter-tabs__btn"
      [class.filter-tabs__btn--active]="tab.key === active()"
      (click)="tabChange.emit(tab.key)"
      type="button"
    >
      {{ tab.label }}
      @if (tab.count != null) {
        <span class="filter-tabs__count">{{ tab.count }}</span>
      }
    </button>
  }
</div>
