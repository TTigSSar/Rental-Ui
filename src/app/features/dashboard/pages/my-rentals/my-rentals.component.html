<app-dashboard-shell activeNav="my-rentals">
  <div class="page-head">
    <div>
      <h1 class="page-title">My rentals</h1>
      <p class="page-sub">Toys you're renting from other families.</p>
    </div>
  </div>

  <app-filter-tabs [tabs]="tabs" [active]="activeTab()" (tabChange)="activeTab.set($event)" />

  <div class="rentals-list">
    @for (r of rentals(); track r.id) {
      <div class="rental-card" [class.rental-card--active]="activeTab() === 'active'">
        <img [src]="r.imageUrl" [alt]="r.toy" class="rental-card__thumb" loading="lazy" />

        <div class="rental-card__info">
          <div class="rental-card__title-row">
            <span class="rental-card__toy">{{ r.toy }}</span>
            <app-status-badge [status]="r.status" />
          </div>
          <div class="rental-card__meta">
            <img [src]="r.ownerImg" [alt]="r.ownerName" class="rental-card__owner-avatar" />
            <span class="rental-card__owner">{{ r.ownerName }}</span>
            <span class="rental-card__sep">·</span>
            <app-icon name="calendar" [size]="13" />
            <span>{{ r.dates }}</span>
          </div>
        </div>

        <div class="rental-card__right">
          <span class="rental-card__total">{{ r.total }}</span>
          @if (r.timeLabel) {
            <span class="rental-card__timelabel" [class.rental-card__timelabel--warn]="r.timeWarn">
              {{ r.timeLabel }}
            </span>
          }
        </div>

        <div class="rental-card__actions">
          @if (activeTab() === 'active') {
            <button class="btn btn--dark">Manage rental</button>
            <button class="btn btn--ghost">Message</button>
          }
          @if (activeTab() === 'upcoming') {
            <button class="btn btn--ghost">Message</button>
            <button class="btn btn--ghost-danger">Cancel</button>
          }
          @if (activeTab() === 'past') {
            <button class="btn btn--primary">Leave review</button>
            <button class="btn btn--ghost">Rent again</button>
          }
        </div>
      </div>
    }
  </div>
</app-dashboard-shell>
