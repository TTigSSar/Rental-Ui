<div class="review-card">
  <div class="review-card__header">
    <div class="review-card__author">
      @if (review().reviewerAvatarUrl) {
        <img
          class="review-card__avatar"
          [src]="review().reviewerAvatarUrl"
          [alt]="reviewerName()"
        />
      } @else {
        <app-ui-avatar [name]="reviewerName()" />
      }
      <div class="review-card__meta">
        <span class="review-card__name">{{ reviewerName() }}</span>
        <span class="review-card__date" [title]="fullDate()">{{ relativeDate() }}</span>
      </div>
    </div>

    <app-ui-star-rating [rating]="review().rating" size="sm" [readonly]="true" />
  </div>

  @if (review().comment) {
    <p class="review-card__comment">{{ review().comment }}</p>
  }
</div>
