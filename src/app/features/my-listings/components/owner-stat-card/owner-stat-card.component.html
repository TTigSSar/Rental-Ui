<div class="stat-card">
  <p class="stat-card__label">
    <i class="stat-card__icon {{ icon() }}" aria-hidden="true"></i>
    <span>{{ label() }}</span>
  </p>
  <p class="stat-card__value">{{ value() }}</p>
  @if (delta(); as delta) {
    <p
      class="stat-card__delta"
      [class.stat-card__delta--positive]="deltaTone() === 'positive'"
    >
      {{ delta }}
    </p>
  }
</div>
