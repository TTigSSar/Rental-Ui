@if (error$ | async; as error) {
  <p-message severity="error" styleClass="auth-form__message--error">
    <div class="auth-form__error-content">
      <strong>{{ 'auth.register.errorTitle' | translate }}</strong>
      <span>{{ error }}</span>
    </div>
  </p-message>
}

<form class="auth-form" [formGroup]="registerForm" (ngSubmit)="submit()">
  <app-ui-input
    type="text"
    formControlName="firstName"
    [label]="'auth.form.firstName' | translate"
    [placeholder]="'auth.form.firstNamePlaceholder' | translate"
    autocomplete="given-name"
    [disabled]="(isLoading$ | async) ?? false"
    [errorMessage]="hasError('firstName', 'required') ? ('auth.validation.firstNameRequired' | translate) : null"
  />
  <app-ui-input
    type="text"
    formControlName="lastName"
    [label]="'auth.form.lastName' | translate"
    [placeholder]="'auth.form.lastNamePlaceholder' | translate"
    autocomplete="family-name"
    [disabled]="(isLoading$ | async) ?? false"
    [errorMessage]="hasError('lastName', 'required') ? ('auth.validation.lastNameRequired' | translate) : null"
  />

  <app-ui-input
    type="tel"
    formControlName="phoneNumber"
    [label]="'auth.form.phoneNumber' | translate"
    [placeholder]="'auth.form.phoneNumberPlaceholder' | translate"
    autocomplete="tel"
    [required]="true"
    [disabled]="(isLoading$ | async) ?? false"
    [errorMessage]="phoneErrorKey() ? (phoneErrorKey() | translate) : null"
  />

  <app-ui-input
    type="email"
    formControlName="email"
    [label]="'auth.form.email' | translate"
    [placeholder]="'auth.form.emailPlaceholder' | translate"
    autocomplete="email"
    [disabled]="(isLoading$ | async) ?? false"
    [errorMessage]="hasError('email', 'required') ? ('auth.validation.emailRequired' | translate) : hasError('email', 'email') ? ('auth.validation.emailInvalid' | translate) : null"
  />

  <app-ui-input
    type="password"
    formControlName="password"
    [label]="'auth.form.password' | translate"
    [placeholder]="'auth.form.passwordPlaceholder' | translate"
    autocomplete="new-password"
    [disabled]="(isLoading$ | async) ?? false"
    [hint]="'auth.register.passwordHint' | translate"
    [errorMessage]="hasError('password', 'required') ? ('auth.validation.passwordRequired' | translate) : hasError('password', 'minlength') ? ('auth.validation.passwordMinLength' | translate) : null"
  />

  <p-button
    type="submit"
    styleClass="auth-form__submit-button"
    [loading]="(isLoading$ | async) ?? false"
    [disabled]="(isLoading$ | async) ?? false"
    [label]="'auth.register.submit' | translate"
  />
</form>

<p class="auth-form__switch">
  {{ 'auth.register.haveAccount' | translate }}
  <button type="button" class="auth-form__switch-btn" (click)="switchMode.emit()">
    {{ 'auth.register.goToLogin' | translate }}
  </button>
</p>

<div class="auth-form__trust">
  <i class="pi pi-shield" aria-hidden="true"></i>
  <span>{{ 'auth.register.trustNote' | translate }}</span>
</div>
