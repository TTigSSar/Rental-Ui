@if (error$ | async; as error) {
  <p-message severity="error" styleClass="auth-form__message--error">
    <div class="auth-form__error-content">
      <strong>{{ 'auth.login.errorTitle' | translate }}</strong>
      <span>{{ error }}</span>
    </div>
  </p-message>
}

<form class="auth-form" [formGroup]="loginForm" (ngSubmit)="submit()">
  <app-ui-input
    type="email"
    formControlName="email"
    [label]="'auth.form.email' | translate"
    [placeholder]="'auth.form.emailPlaceholder' | translate"
    autocomplete="email"
    [disabled]="(isLoading$ | async) ?? false"
    [errorMessage]="hasError('email', 'required') ? ('auth.validation.emailRequired' | translate) : hasError('email', 'email') ? ('auth.validation.emailInvalid' | translate) : null"
  />

  <app-ui-input
    type="password"
    formControlName="password"
    [label]="'auth.form.password' | translate"
    [placeholder]="'auth.form.passwordPlaceholder' | translate"
    autocomplete="current-password"
    [disabled]="(isLoading$ | async) ?? false"
    [errorMessage]="hasError('password', 'required') ? ('auth.validation.passwordRequired' | translate) : hasError('password', 'minlength') ? ('auth.validation.passwordMinLength' | translate) : null"
  />

  <p-button
    type="submit"
    styleClass="auth-form__submit-button"
    [loading]="(isLoading$ | async) ?? false"
    [disabled]="(isLoading$ | async) ?? false"
    [label]="'auth.login.submit' | translate"
  />
</form>

<p class="auth-form__switch">
  {{ 'auth.login.noAccount' | translate }}
  <button type="button" class="auth-form__switch-btn" (click)="switchMode.emit()">
    {{ 'auth.login.goToRegister' | translate }}
  </button>
</p>

<div class="auth-form__trust">
  <i class="pi pi-shield" aria-hidden="true"></i>
  <span>{{ 'auth.login.trustNote' | translate }}</span>
</div>
