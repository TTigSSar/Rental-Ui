<div class="register-page">
  <section class="register-page__shell">
    <aside class="register-page__left-panel">
      <div class="register-page__brand-block">
        <h2 class="register-page__welcome-title">{{ 'auth.register.welcomeTitle' | translate }}</h2>
        <p class="register-page__welcome-subtitle">
          {{ 'auth.register.welcomeSubtitle' | translate }}
        </p>
      </div>
      <div class="register-page__illustration" aria-hidden="true"></div>
    </aside>

    <div class="register-page__right-panel">
      <div class="register-page__card">
        <h1 class="register-page__title">{{ 'auth.register.title' | translate }}</h1>
        <p class="register-page__subtitle">{{ 'auth.register.subtitle' | translate }}</p>
        <app-register-form (switchMode)="onSwitchToLogin()" />
      </div>
    </div>
  </section>
</div>
