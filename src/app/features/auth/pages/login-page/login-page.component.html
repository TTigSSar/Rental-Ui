<div class="login-page">
  <section class="login-page__shell">
    <aside class="login-page__left-panel">
      <div class="login-page__brand-block">
        <h2 class="login-page__welcome-title">{{ 'auth.login.welcomeTitle' | translate }}</h2>
        <p class="login-page__welcome-subtitle">
          {{ 'auth.login.welcomeSubtitle' | translate }}
        </p>
      </div>
      <div class="login-page__illustration" aria-hidden="true"></div>
    </aside>

    <div class="login-page__right-panel">
      <div class="login-page__card">
        <h1 class="login-page__title">{{ 'auth.login.title' | translate }}</h1>
        <p class="login-page__subtitle">{{ 'auth.login.subtitle' | translate }}</p>
        <app-login-form (switchMode)="onSwitchToRegister()" />
      </div>
    </div>
  </section>
</div>
