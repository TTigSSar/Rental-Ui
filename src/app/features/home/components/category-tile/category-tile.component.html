@let data = category();
<button
  type="button"
  class="category-tile"
  [attr.aria-label]="data.label"
  (click)="onClick()"
>
  <div
    class="category-tile__media"
    [style.background]="
      data.imageUrl
        ? null
        : 'linear-gradient(135deg, ' + data.tintA + ', ' + data.tintB + ')'
    "
    aria-hidden="true"
  >
    @if (data.imageUrl) {
      <img
        class="category-tile__image"
        [src]="data.imageUrl"
        alt=""
        loading="lazy"
        decoding="async"
      />
    } @else {
      <i class="category-tile__icon" [class]="iconClass()"></i>
    }
    <!-- Purely decorative: the button's own aria-label carries the category
         name, so this overlay stays out of the a11y tree and screen readers
         announce the name exactly once — on desktop, where this is the only
         visible label, and on mobile, where the chip below takes over. -->
    <span class="category-tile__overlay-label" aria-hidden="true">{{ data.label }}</span>
  </div>
  <!-- Mobile-only (≤560px). Hidden on desktop by CSS, where the in-card overlay
       label is the single visible label. Kept in the DOM (not @if) so the media
       query alone decides, and `display: none` keeps it out of the a11y tree so
       it can never duplicate the button's accessible name. -->
  <span class="category-tile__chip" aria-hidden="true">{{ data.label }}</span>
</button>
