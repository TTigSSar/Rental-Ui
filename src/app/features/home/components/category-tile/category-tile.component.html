@let data = category();
<button
  type="button"
  class="category-tile"
  [attr.aria-label]="data.label"
  (click)="onClick()"
>
  <div
    class="category-tile__media"
    [style.background]="
      data.imageUrl
        ? null
        : 'linear-gradient(135deg, ' + data.tintA + ', ' + data.tintB + ')'
    "
    aria-hidden="true"
  >
    @if (data.imageUrl) {
      <img
        class="category-tile__image"
        [src]="data.imageUrl"
        alt=""
        loading="lazy"
        decoding="async"
      />
    } @else {
      <i class="category-tile__icon" [class]="iconClass()"></i>
    }
  </div>
  <span class="category-tile__chip">{{ data.label }}</span>
</button>
