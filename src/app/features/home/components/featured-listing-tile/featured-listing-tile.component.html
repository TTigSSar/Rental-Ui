@let data = listing();
<a
  class="product-card"
  [routerLink]="['/listings', data.id]"
  [attr.aria-label]="data.title"
>
  <app-ui-image-container class="product-card__media" aspectRatio="325 / 380">
    @if (data.mainImageUrl) {
      <img
        class="product-card__image"
        [src]="data.mainImageUrl"
        [alt]="data.title"
        loading="lazy"
        width="325"
        height="380"
      />
    } @else {
      <div class="product-card__placeholder" aria-hidden="true">
        <i class="pi pi-image"></i>
      </div>
    }
  </app-ui-image-container>

  <div class="product-card__body">
    <div class="product-card__top">
      <h3 class="product-card__title">{{ data.title }}</h3>
      <p class="product-card__city">{{ data.city }}</p>
    </div>

    <div class="product-card__meta">
      <span class="product-card__category">
        {{ 'home.featured.placeholderCategory' | translate }}
      </span>
    </div>

    <div class="product-card__footer">
      <p class="product-card__price">
        {{
          'home.featured.pricePerDay'
            | translate: { amount: (data.pricePerDay | currency) }
        }}
      </p>
      <div class="product-card__actions">
        <span
          class="product-card__action product-card__action--chat"
          aria-hidden="true"
        >
          <i class="pi pi-comment"></i>
        </span>
        <button
          type="button"
          class="product-card__action product-card__action--save"
          [class.product-card__action--active]="data.isFavorite"
          [attr.aria-label]="'home.featured.toggleFavorite' | translate"
          [attr.aria-pressed]="data.isFavorite"
          (click)="onFavoriteClick($event)"
        >
          <i
            [class]="data.isFavorite ? 'pi pi-bookmark-fill' : 'pi pi-bookmark'"
          ></i>
        </button>
      </div>
    </div>
  </div>
</a>
