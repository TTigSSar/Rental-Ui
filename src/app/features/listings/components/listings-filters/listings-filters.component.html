<!-- ── Search + filter button row ── -->
<div class="lf-bar">
  <app-ui-input
    type="search"
    [formControl]="filterForm.controls.query"
    [placeholder]="'listings.filters.queryPlaceholder' | translate"
  />
  <button
    type="button"
    class="lf-bar__filter-btn"
    [class.lf-bar__filter-btn--active]="hasSheetFilters()"
    [attr.aria-label]="'listings.filters.filterBtn' | translate"
    [attr.aria-expanded]="sheetOpen()"
    (click)="openSheet()"
  >
    <i class="pi pi-sliders-h" aria-hidden="true"></i>
  </button>
</div>

<!-- ── Active filter chips ── -->
@if (activeChips().length > 0) {
  <div class="lf-chips" role="list">
    @for (chip of activeChips(); track chip.key) {
      <div class="lf-chip" role="listitem">
        <span class="lf-chip__label">{{ chip.label }}</span>
        <button
          type="button"
          class="lf-chip__remove"
          [attr.aria-label]="chip.label"
          (click)="removeChip(chip.key)"
        >
          <i class="pi pi-times" aria-hidden="true"></i>
        </button>
      </div>
    }
  </div>
}

<!-- ── Filter bottom sheet ── -->
@if (sheetOpen()) {
  <div
    class="lf-backdrop"
    aria-hidden="true"
    (click)="closeSheet()"
  ></div>

  <div
    class="lf-sheet"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="'listings.filters.filterBtn' | translate"
  >
    <div class="lf-sheet__handle" aria-hidden="true"></div>

    <div class="lf-sheet__header">
      <h2 class="lf-sheet__title">{{ 'listings.filters.filterBtn' | translate }}</h2>
    </div>

    <div class="lf-sheet__body" [formGroup]="draftForm">

      <!-- City -->
      <div class="lf-field">
        <app-ui-input
          type="text"
          formControlName="city"
          [label]="'listings.filters.city' | translate"
          [placeholder]="'listings.filters.cityPlaceholder' | translate"
          autocomplete="address-level2"
        />
      </div>

      <!-- Category -->
      <div class="lf-field">
        <span class="lf-field__label">
          {{ 'listings.filters.categoryId' | translate }}
        </span>
        <app-category-selector
          [categories]="categoryOptions()"
          [selectedCategoryId]="draftForm.controls.categoryId.value || null"
          [placeholder]="'listings.filters.categoryPlaceholder' | translate"
          (categoryChange)="draftForm.controls.categoryId.setValue($event ?? '')"
        />
      </div>

      <!-- Price range -->
      <div class="lf-field-row">
        <div class="lf-field">
          <label class="lf-field__label" for="lf-min-price">
            {{ 'listings.filters.minPrice' | translate }}
          </label>
          <p-inputNumber
            inputId="lf-min-price"
            formControlName="minPrice"
            mode="decimal"
            [minFractionDigits]="0"
            [maxFractionDigits]="2"
            [useGrouping]="true"
            [placeholder]="'listings.filters.minPricePlaceholder' | translate"
            styleClass="lf-field__input"
          />
        </div>
        <div class="lf-field">
          <label class="lf-field__label" for="lf-max-price">
            {{ 'listings.filters.maxPrice' | translate }}
          </label>
          <p-inputNumber
            inputId="lf-max-price"
            formControlName="maxPrice"
            mode="decimal"
            [minFractionDigits]="0"
            [maxFractionDigits]="2"
            [useGrouping]="true"
            [placeholder]="'listings.filters.maxPricePlaceholder' | translate"
            styleClass="lf-field__input"
          />
        </div>
      </div>

    </div>

    <div class="lf-sheet__footer">
      <button
        type="button"
        class="lf-sheet__btn lf-sheet__btn--clear"
        (click)="clearSheet()"
      >
        {{ 'listings.filters.clear' | translate }}
      </button>
      <button
        type="button"
        class="lf-sheet__btn lf-sheet__btn--apply"
        (click)="applySheet()"
      >
        {{ 'listings.filters.filterSheet.apply' | translate }}
      </button>
    </div>
  </div>
}
