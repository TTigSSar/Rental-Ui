# Maps the incoming Upgrade header to the value we forward on the Connection header.
# Lives at http context (loaded from /etc/nginx/conf.d/00-map.conf before default.conf),
# because `map` is only valid at http level and default.conf is a server block.
# WebSocket/SSE upgrade requests get `Connection: upgrade`; plain requests (SignalR
# negotiate, long-polling) get `Connection: close` so they aren't falsely marked as upgrades.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
