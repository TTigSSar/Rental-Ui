server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text-based responses
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-lived cache for content-hashed build assets
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the app shell so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Proxy API and file uploads to the backend container
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://api:8080/uploads/;
        proxy_set_header Host $host;
    }

    # SPA routing: fall unknown routes back to the Angular app shell
    location / {
        try_files $uri $uri/ /index.html;
    }
}
